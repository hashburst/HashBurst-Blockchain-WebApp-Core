# ═══════════════════════════════════════════════════════════════════
# SNIPPET NGINX per hashburst.io — configurazione HTTPS
# Da inserire nel nginx.conf del server hashburst.io (77.90.188.157)
#
# Prerequisito: certificato Let's Encrypt già ottenuto con:
#   certbot certonly --webroot -w /var/www/certbot \
#     -d hashburst.io -d www.hashburst.io \
#     --email admin@hashburst.io --agree-tos --non-interactive
# ═══════════════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hashburst.io www.hashburst.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://hashburst.io$request_uri;
    }
}

# HTTPS principale
server {
    listen 443 ssl http2;
    server_name hashburst.io www.hashburst.io;

    # Certificati Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/hashburst.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hashburst.io/privkey.pem;

    # TLS moderno (TLS 1.2 + 1.3 only)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS — dice al browser "usa sempre HTTPS" per 2 anni
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS — permette alla WebApp locale dell'utente di chiamare l'API
    # La WebApp gira su localhost:5173 (npm run dev) o su file:// (build)
    # IMPORTANTE: non usare * in produzione con credenziali
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Proxy verso il nodo blockchain (porta interna)
    location /api/ {
        proxy_pass         http://localhost:8007/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy verso IPFS gateway
    location /ipfs/ {
        proxy_pass http://localhost:8080/ipfs/;
        proxy_read_timeout 120s;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # Proxy verso IPFS API (upload)
    location /ipfs-api/ {
        proxy_pass http://localhost:5001/;
        proxy_read_timeout 120s;
        client_max_body_size 100m;
    }

    # Proxy verso HVM
    location /hvm/ {
        proxy_pass http://localhost:8181/;
        proxy_read_timeout 60s;
    }

    # Block Explorer (se deployato)
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check pubblico
    location /health {
        proxy_pass http://localhost:8007/api/health;
    }
}
